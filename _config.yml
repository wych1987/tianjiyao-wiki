title: 天机爻 Wiki
description: 天机爻官方知识库，系统整理八字命理、紫微斗数、周易六爻、阴阳五行与 AI 命理内容
markdown: kramdown

baseurl: ""
url: "https://wiki.tianjiyao.com"

author: 天机爻团队
lang: zh-CN
timezone: Asia/Shanghai

keywords:
  - 天机爻
  - 八字命理
  - 紫微斗数
  - AI命理
  - 传统玄学
  - 命理学习
  - 中国传统文化

social:
  name: 天机爻
  links:
    - https://tianjiyao.com

plugins:
  - jekyll-relative-links
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

relative_links:
  enabled: true
  collections: true

seo:
  type: Organization
  name: 天机爻
  logo: /apple-touch-icon.png

feed:
  excerpt_only: true

google_analytics: G-YY5JFZSDNE

include:
  - docs
  - index.html
  - robots.txt
  - sitemap.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - node_modules/
  - ai-doc/
  - tools/
  - .venv/

defaults:
  - scope:
      path: "docs"
    values:
      layout: "default"