source: docs

title: 天机爻 Wiki - 中国传统玄学知识库
description: 天机爻官方知识库，专业提供八字命理、紫微斗数、AI玄学等中国传统命理学系统性学习资源
markdown: kramdown

baseurl: ""
url: "https://wiki.tianjiyao.com"

author: 天机爻团队
lang: zh-CN
timezone: Asia/Shanghai

keywords:
  - 天机爻
  - 八字命理
  - 紫微斗数
  - AI命理
  - 传统玄学
  - 命理学习
  - 中国传统文化

social:
  name: 天机爻
  links:
    - https://tianjiyao.com

plugins:
  - jekyll-relative-links
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

relative_links:
  enabled: true
  collections: true

seo:
  type: Organization
  name: 天机爻
  logo: /assets/images/logo.png

feed:
  excerpt_only: true

google_analytics: G-YY5JFZSDNE

include:
  - README.md
  - index.md
  - _redirects

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/

defaults:
  - scope:
      path: ""
    values:
      layout: "default"