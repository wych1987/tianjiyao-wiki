<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天机爻 Wiki</title>
    <meta http-equiv="refresh" content="0; url=/docs/">
    <link rel="canonical" href="https://wiki.tianjiyao.com/docs/">
    <script>
        window.location.replace('/docs/');
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #f4f8fc 0%, #eef8f3 100%);
            color: #1f2937;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .jump-card {
            width: min(560px, calc(100vw - 32px));
            padding: 32px;
            border: 1px solid #d7e2ee;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 24px 48px rgba(21, 87, 153, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #155799;
            font-size: 1.8rem;
        }

        p {
            margin: 0 0 14px;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .actions a {
            display: inline-flex;
            align-items: center;
            min-height: 42px;
            padding: 0 16px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
        }

        .actions a:first-child {
            background: #155799;
            color: #ffffff;
        }

        .actions a:last-child {
            background: #eef6ff;
            color: #155799;
        }
    </style>
</head>
<body>
    <div class="jump-card">
        <h1>正在进入天机爻 Wiki</h1>
        <p>当前根路径会自动跳转到知识库首页。如果浏览器没有自动跳转，请使用下面的入口继续。</p>
        <div class="actions">
            <a href="/docs/">进入知识库首页</a>
            <a href="https://www.tianjiyao.com/zh" target="_blank" rel="noopener">访问天机爻主站 ↗</a>
        </div>
    </div>
</body>
</html>
